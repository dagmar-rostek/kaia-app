services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: kaia
      POSTGRES_USER: kaia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaia -d kaia"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://kaia:${POSTGRES_PASSWORD}@db:5432/kaia
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      SENTRY_KAIA_API: ${SENTRY_KAIA_API}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      STUDY_MODE: ${STUDY_MODE:-development}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ../apps/web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://kaia.rostek-dagmar.eu/api
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
